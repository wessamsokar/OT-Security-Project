services:

  # ─── Frontend PRODUCTION placeholder (dev mode) ───────────────────────────
  # The real frontend in dev is served by frontend-dev (Vite HMR).
  # This lightweight container exists only to satisfy gateway's depends_on.
  # nginx.dev.conf already routes / → frontend-dev:5173, NOT here.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

  # ─── Backend (hot-reload) ───────────────────────────────────────────────────
  backend:
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app          # Mount live code into container
    # List form so docker-entrypoint.sh receives argv correctly after `alembic upgrade head`
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app

  # ─── Backend Worker (hot-reload) ────────────────────────────────────────────
  backend-worker:
    volumes:
      - ./backend:/app
    command:
      - celery
      - -A
      - app.tasks.celery_app.celery_app
      - worker
      - --loglevel=info
      - --autoscale=2,1

  # ─── Frontend (Vite HMR dev server) ─────────────────────────────────────────
  frontend-dev:
    image: node:20-alpine
    container_name: ics-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: /api
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ics_net

  # ─── Gateway (dev nginx — proxies /api → backend, / → Vite HMR) ─────────────
  gateway:
    volumes:
      - ./gateway/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-dev
      - backend
