services:
  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      AUTH_COOKIE_SECURE: "true"
      AUTH_COOKIE_SAMESITE: lax
      BOOTSTRAP_ADMIN_ENABLED: "false"
      HIDDEN_ADMIN_EMAILS: ""
      PUBLIC_LIVE_SNAPSHOT_ENABLED: "false"

  backend-worker:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      BOOTSTRAP_ADMIN_ENABLED: "false"
      HIDDEN_ADMIN_EMAILS: ""

  ml-service:
    environment:
      APP_ENV: production

  gateway:
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./gateway/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_PATH:-./gateway/certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_KEY_PATH:-./gateway/certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro
