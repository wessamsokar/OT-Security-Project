server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Per-request nonce injection for the Vite SPA entry HTML.
  sub_filter_once off;
  sub_filter_types text/html;
  sub_filter "__CSP_NONCE__" "$request_id";
  # Vite rewrites the source script tag during build and drops template attributes.
  # Add the nonce at serve time so the built module entry is allowed by script-src.
  sub_filter '<script type="module" crossorigin src="' '<script nonce="$request_id" type="module" crossorigin src="';
  sub_filter '<script type="module" src="' '<script nonce="$request_id" type="module" src="';

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$request_id'; script-src-attr 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; connect-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; form-action 'self'; report-uri /api/v1/audit/csp-report" always;

  location / {
    try_files $uri /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$request_id'; script-src-attr 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; connect-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; form-action 'self'; report-uri /api/v1/audit/csp-report" always;
    try_files $uri =404;
  }
}
