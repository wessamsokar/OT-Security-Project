services:
  postgres:
    image: postgres:16-alpine
    container_name: ics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ics_net

  redis:
    image: redis:7-alpine
    container_name: ics-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ics_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ics-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: redis://redis:${REDIS_PORT}/0
      ML_SERVICE_URL: http://ml-service:8001
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      ML_SERVICE_API_KEY: ${ML_SERVICE_API_KEY:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      ML_INFER_TIMEOUT_SECONDS: ${ML_INFER_TIMEOUT_SECONDS:-60}
      ML_RETRAIN_TIMEOUT_SECONDS: ${ML_RETRAIN_TIMEOUT_SECONDS:-120}
      SSE_MAX_CONNECTIONS: ${SSE_MAX_CONNECTIONS:-50}
      SSE_MAX_CONNECTION_SECONDS: ${SSE_MAX_CONNECTION_SECONDS:-1800}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ics_net

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ics-backend-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      REDIS_URL: redis://redis:${REDIS_PORT}/0
      ML_SERVICE_URL: http://ml-service:8001
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      ML_SERVICE_API_KEY: ${ML_SERVICE_API_KEY:-}
      # docker-entrypoint.sh: avoid concurrent alembic with backend on compose up
      SKIP_ALEMBIC: "1"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - ics_net

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ics-ml
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      ML_INTERNAL_API_KEY: ${ML_SERVICE_API_KEY:-}
    env_file:
      - path: ./ml-service/.env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ics_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ics-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ics_net

  gateway:
    image: nginx:1.27-alpine
    container_name: ics-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ics_net

volumes:
  postgres_data:
  redis_data:

networks:
  ics_net:
    driver: bridge
